<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng cửu chương</title>
</head>
<body> 
    <h3>In bảng cửu chương</h3>
    <form id = "frmBangcc">
        <label>Nhập số</label> <br>
        <input type="text" id = "txtSo" value="5"><br><br>
        <input type="botton" id = "btIn" value="In" onclick="inBangcc()">
    </form>
    <div id ="kq"></div>
    <script>
        function inBangcc(){
            let myForm = document.forms["frmBangcc"];
            let myNum = myForm.elements[0].value;
            let kq="";
        for (let i =1; i<=10;i++){
            kq += myNum +" x " + i + " = " +(myNum * i) + "<br>";
        }
        document.getElementById("kq").innerHTML = kq;
        }

    </script>

</body>
</html>
