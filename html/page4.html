<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style4.css">
</head>
<body> 
    <table border ="4">
        <caption>XUẤT HÓA ĐƠN</caption>
        <tr>
            <th>Tên sản phẩm</th>
            <th>Số lượng</th>
            <th>Đơn giá</th>
            <th>Thành tiền</th>
        </tr>
        <tr>
            <td>A</td>
            <td class ="sl">3</td>
            <td class ="dg">1000</td>
            <td class ="tt"></td>
        </tr>
        <tr>
            <td>B</td>
            <td class ="sl">4</td>
            <td class ="dg">2000</td>
            <td class ="tt"></td>
        </tr>
        <tr>
            <td>C</td>
            <td class ="sl">5</td>
            <td class ="dg">3000</td>
            <td class ="tt"></td>
        </tr>
        <tr>
            <td>D</td>
            <td class ="sl">1</td>
            <td class ="dg">1000</td>
            <td class ="tt"></td>
        </tr>      
        <tr>
            <td colspan = "3">Tổng thanh toán</td>
            <td id = "kq"></td>
        </tr>      
    </table>
<script>
    const SoLuong = document.getElementsByClassName("sl");
    const DonGia = document.getElementsByClassName("dg");
    const ThanhTien = document.getElementsByClassName("tt");
    let tongthanhtoan = 0;
    //Duyệt qua mỗi dòng
    for(let i=0; i< SoLuong.length; i++)
{
    ThanhTien[i].innerHTML = SoLuong[i].innerHTML * DonGia[i].innerHTML;
    tongthanhtoan += parseInt(ThanhTien[i].innerHTML);
    }
document.getElementById("kq").innerHTML = tongthanhtoan;
</script>
</body>
</html>
