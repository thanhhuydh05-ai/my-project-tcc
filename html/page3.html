<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Sign Up Form</title>
    <link rel="stylesheet" href="../css/style3.css">
</head>
<body>

    <div class="signup-container">
        <h1>Welcome to Facebook</h1>
        <p>Connect with friends and the world around you.</p>

        <form action="#">
            <div class="name-row">
                <input class type="text" placeholder="First Name" required>
                <input class type="text" placeholder="Last Name" required>
            </div>
            
            <input class type="email" placeholder="Your Email" required>
            <input class type="email" placeholder="Re-enter Email" required>
            <input class type="password" placeholder="New Password" required>

            <button type="submit" class="signup-btn">Sign Up for Facebook</button>
        </form>
    </div>

</body>
</html>
