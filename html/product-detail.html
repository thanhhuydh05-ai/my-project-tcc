<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Áo Đấu Real Madrid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="../js/lib.js"></script>
</head>
<body style="background-color: #f8f9fa;">

    <div class="container mt-4">
        <nav>
            <a href="page7.html" class="text-decoration-none fw-bold">Trang chủ</a> / <span class="text-secondary">Chi tiết sản phẩm</span>
        </nav>
        <hr>

        <div class="row mt-4 bg-white p-4 rounded shadow-sm border">
            <div class="col-md-5 text-center">
                <img src="" id="img-detail" class="img-fluid img-thumbnail rounded" alt="Ảnh sản phẩm" style="max-height: 400px; object-fit: cover;">
            </div>

            <div class="col-md-7">
                <h2 id="name-detail" class="fw-bold text-dark">Tên sản phẩm</h2>
                <h4 id="price-detail" class="text-danger my-3 fw-bold">Giá: 0đ</h4>
                <p class="fw-bold mb-1">Mô tả sản phẩm:</p>
                <p id="desc-detail" class="text-secondary" style="text-align: justify; line-height: 1.6;">
                    Đang tải thông tin...
                </p>
                <button class="btn btn-primary mt-3 fw-bold px-4">Thêm vào giỏ hàng</button>
            </div>
        </div>
    </div>

    <script>
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const productId = urlParams.get('id');

        // Tìm áo trong kho productList
        const product = productList.find(item => item.id === productId);

        // Đổ ra giao diện
        if (product) {
            document.getElementById('name-detail').innerText = product.name;
            document.getElementById('price-detail').innerText = `Giá: ${product.price}.000 VND`;
            document.getElementById('desc-detail').innerText = product.desc;
            document.getElementById('img-detail').src = product.image;
        } else {
            document.body.innerHTML = "<div class='container mt-5 text-center'><h3 class='text-danger'>Không tìm thấy áo đấu này!</h3><a href='page7.html' class='btn btn-dark mt-3'>Quay lại trang chủ</a></div>";
        }
    </script>

</body>
</html>
